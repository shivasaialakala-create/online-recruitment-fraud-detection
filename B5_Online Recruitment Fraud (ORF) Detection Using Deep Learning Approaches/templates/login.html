<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Recruitment Fraud (ORF) Detection</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        /* Define color variables for easier theming */
        :root {
            --primary-coral: #ff6f61; /* Main button/accent color */
            --secondary-yellow: #feb47b; /* Border/focus color */
            --background-dark: rgba(0, 0, 0, 0.6); /* Dark overlay */
            --text-dark: #333;
            --text-light: #fff;
            --font-family: 'Poppins', sans-serif;
        }

        body {
            font-family: var(--font-family);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            height: 100vh;
            background-image: url('static/images/images7.jpg');
            background-size: cover;
            background-position: center;
            position: relative;
            color: var(--text-dark);
            overflow: hidden; /* Hide potential scrollbar */
        }
        
        /* NEW: Dark, Blurred Overlay for Richer Background and Focus */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--background-dark);
            backdrop-filter: blur(5px); /* Add blur effect */
            z-index: -1;
        }

        /* NEW: Main Page Title Styling */
        .main-title {
            color: var(--text-light);
            font-size: 2.5em;
            font-weight: 700;
            margin-bottom: 30px; /* More spacing */
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.8);
            letter-spacing: 0.5px;
        }

        .container {
            background: rgba(255, 255, 255, 0.98); /* Less transparent for focus */
            padding: 45px;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4); /* Deeper shadow */
            text-align: center;
            width: 380px; /* Slightly wider for modern feel */
            position: relative;
            z-index: 10;
        }

        h2 {
            margin-bottom: 25px;
            color: var(--primary-coral); /* Use primary color for form header */
            font-size: 1.8em;
            font-weight: 600;
        }
        
        /* Input Wrapper for Icon Positioning */
        .input-group {
            position: relative;
            margin: 15px 0;
            width: 100%;
        }

        input[type="text"], input[type="password"] {
            padding: 15px 15px 15px 50px; /* Increased left padding for icon */
            width: 100%; 
            border: 2px solid #ddd; /* Lighter default border */
            border-radius: 30px; /* Even rounder edges */
            transition: all 0.3s;
            box-sizing: border-box; /* Include padding/border in element's total width/height */
        }
        
        /* NEW: Icon styling */
        .input-group i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary-coral);
            font-size: 1.1em;
            transition: color 0.3s;
        }

        input[type="text"]:focus, input[type="password"]:focus {
            border-color: var(--primary-coral);
            box-shadow: 0 0 10px rgba(255, 111, 97, 0.5); /* Stronger glow effect */
            outline: none;
        }
        /* Change icon color on focus */
        .input-group:focus-within i {
            color: var(--secondary-yellow);
        }

        /* NEW: Button Gradient for Richness */
        .button { 
            padding: 15px 35px; 
            background: linear-gradient(135deg, var(--primary-coral) 0%, #ff5a47 100%); /* Subtle gradient */
            color: var(--text-light); 
            border: none; 
            border-radius: 30px; 
            cursor: pointer; 
            margin-top: 25px; 
            font-size: 1.1em; 
            font-weight: 600;
            transition: all 0.3s ease; 
            box-shadow: 0 8px 20px rgba(255, 111, 97, 0.4); /* Prominent shadow */
            width: 100%; /* Make button full width */
        }

        .button:hover { 
            background: linear-gradient(135deg, #ff5a47 0%, var(--primary-coral) 100%); /* Reverse gradient on hover */
            transform: translateY(-3px) scale(1.02); /* More noticeable lift/scale */
            box-shadow: 0 12px 25px rgba(255, 111, 97, 0.6);
        }
        .button:active { 
            transform: translateY(0);
            box-shadow: 0 4px 10px rgba(255, 111, 97, 0.4);
        }

        p {
            margin-top: 25px;
            color: var(--text-dark);
            font-size: 0.95em;
        }
        a {
            color: var(--primary-coral);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }
        a:hover {
            color: #d14f44; /* Darker coral on hover */
            text-decoration: underline;
        }

        /* Removed .container::before decorative border as the new shadow and focus effects are sufficient for richness */

    </style>
</head>
<body>

    <h1 class="main-title">Online Recruitment Fraud Detection 🛡️</h1>
    
    <div class="container">
        <h2>Welcome Back!</h2> 
        <form action="/submit_login" method="POST">
            
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" name="username" placeholder="Username" required>
            </div>
            
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" name="password" placeholder="Password" required>
            </div>
            
            <button type="submit" class="button">
                <i class="fas fa-sign-in-alt" style="margin-right: 5px;"></i> Login
            </button>
        </form>
        <p>Don't have an account? <a href="/signup">Create one now!</a></p>
    </div>
</body>
</html>
